# 快速狀態檢查 — 看各子專案最新狀態
# 觸發：orch "status" / "狀態"（任一同義詞皆可觸發）
# 注意：ASCII trigger（"status"）會做 word-boundary 檢查（不會誤觸發於 "statusbar"/"gitstatus"）
# CJK trigger（"狀態"）用 substring 匹配（"看一下狀態" 也會觸發）
name: "status"
trigger: ["status", "狀態"]
description: "快速顯示各子專案現況和待辦"
steps:
  - id: check
    agent: shell
    command: |
      echo "📊 Cowork 子專案狀態" && echo "" && \
      for dir in AWS GCP OnPremise momo Salesforce Study; do \
        if [ -f "$dir/docs/_agent_handoff.md" ]; then \
          echo "━━━ $dir ━━━" && \
          head -20 "$dir/docs/_agent_handoff.md" | grep -E "更新時間|狀態|摘要" | head -3 && \
          echo ""; \
        fi; \
      done
