# 交給 Victoria — 將任務交給 Claude Code 執行
# 觸發：orch "交給 Victoria" / "叫 Claude Code" / "丟給 CC"（任一同義詞皆可觸發）
name: "handoff-to-victoria"
trigger: ["交給 Victoria", "叫 Claude Code", "丟給 CC"]
description: "將指定任務交給 Claude Code (Victoria) 執行"
steps:
  - id: delegate
    agent: claude
    prompt: |
      使用者要求將以下任務交給你處理。
      請依照 CLAUDE.md 和 _agent_handoff.md 的規範執行：

      任務：{{.user_input}}

      完成後請更新交接表。
