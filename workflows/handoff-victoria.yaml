# 交給 Victoria — 將任務交給 Claude Code 執行
# 觸發：orch "交給 Victoria"（trigger 目前只支援單一詞，"丟給 CC" 不會觸發，見 workflow.Workflow.Trigger）
name: "handoff-to-victoria"
trigger: "交給 Victoria"
description: "將指定任務交給 Claude Code (Victoria) 執行"
steps:
  - id: delegate
    agent: claude
    prompt: |
      使用者要求將以下任務交給你處理。
      請依照 CLAUDE.md 和 _agent_handoff.md 的規範執行：

      任務：{{.user_input}}

      完成後請更新交接表。
