# orch config
# Default path: ~/.config/orch/config.yaml
# Override with ORCH_CONFIG environment variable

persona:
  name: "orch"
  owner: "Gordon Wei"
  language: "zh-TW"
  system_prompt: |
    You are orch, an AI Chief of Staff CLI tool running on macOS.
    Your owner is Gordon Wei (Head of Infrastructure, momo).
    You coordinate multiple AI agents (kiro, claude, gemini) to complete tasks.

    Response rules:
    - Reply in Traditional Chinese (zh-TW)
    - Be concise and direct
    - Keep technical terms in English (Kubernetes, Terraform, GKE, etc.)
    - Keep code and commands in English

# === Model Configuration ===
# Supports MLX, Ollama, or any OpenAI-compatible endpoint
# The model with `default: true` is used as the primary model
models:
  - name: "qwen-1.5b"
    backend: "mlx"
    endpoint: "http://localhost:8080"
    model: "mlx-community/Qwen2.5-1.5B-Instruct-4bit"
    python_path: "~/mlx-env/bin/python3"
    auto_start: true
    port: "8080"
    default: true
  # --- Other available models (uncomment to switch) ---
  # - name: "qwen-3b"
  #   backend: "mlx"
  #   endpoint: "http://localhost:8080"
  #   model: "mlx-community/Qwen2.5-3B-Instruct-4bit"
  #   python_path: "~/mlx-env/bin/python3"
  #   auto_start: true
  #   port: "8080"
  #   default: false
  # - name: "llama-8b"
  #   backend: "ollama"
  #   endpoint: "http://localhost:11434"
  #   model: "llama3.1:8b"
  #   auto_start: true
  #   port: "11434"
  #   default: false

# === Backward compatibility (fallback if models[] is not defined) ===
local_llm:
  endpoint: "http://localhost:8080"
  model: "mlx-community/Qwen2.5-1.5B-Instruct-4bit"
  python_path: "~/mlx-env/bin/python3"
  auto_start: true

# === Memory Layer ===
memory:
  db_path: "~/.config/orch/orch.db"
  briefing_on_boot: true    # show last briefing summary on startup
  auto_summarize: true      # auto-compress task summary into briefing after completion
  history_limit: 0          # max history entries (0=unlimited)

# === Workflow Templates ===
# YAML workflows in this directory are loaded and matched by trigger keyword
# (bypasses AI planning when matched)
workflows:
  dir: "~/.config/orch/workflows"

workspace:
  root: "~/Desktop/Cowork"
  subdirs:
    - name: AWS
      keywords: [aws, lambda, s3, ec2, sam, bedrock, cloudformation]
    - name: GCP
      keywords: [gcp, gke, litellm, cloud run, bigquery, gcloud]
    - name: OnPremise
      keywords: [on-premise, onpremise, rke2, metallb, gitea, gateway api]
    - name: momo
      keywords: [momo, weekly, incident, performance, okr, 1-on-1]
    - name: Salesforce
      keywords: [salesforce, banking, proposal, lucy]
    - name: Study
      keywords: [study, notes, learning, orchestrator]

routing:
  kiro: [code, infra, aws, gcp, terraform, deploy, build, test, file-ops, shell]
  claude: [notion, gcal, gmail, google-workspace, writing, analysis, meeting-notes]
  gemini: [long-context, video, image, summarization, google-drive]

keyword_shortcuts:
  - prefix: "kubectl"
    category: infra
  - prefix: "terraform plan"
    category: infra
  - prefix: "terraform apply"
    category: infra
  - prefix: "tf plan"
    category: infra
  - prefix: "tf apply"
    category: infra
  - prefix: "helm upgrade"
    category: deploy
  - prefix: "helm install"
    category: deploy
  - prefix: "helm list"
    category: deploy
  - prefix: "aws s3"
    category: query
  - prefix: "aws ec2"
    category: query
  - prefix: "gcloud compute"
    category: query
  - prefix: "gcloud container"
    category: query

# === DAG Parallel Execution (for YAML workflows) ===
# Each step can specify depends_on for multi-upstream dependencies:
#   depends_on: [step_a, step_b]  → waits for both A and B to complete
#   depends_on: []                → no dependencies, starts immediately in parallel
#
# Backward compatible:
#   depends_on: "step_1"          → equivalent to depends_on: [step_1]
