# orch config template
# Default path: ~/.config/orch/config.yaml
# Override with ORCH_CONFIG environment variable
# Run `orch init` to generate a personalized config interactively.

persona:
  name: "orch"
  # owner: "Your Name"    # set via `orch init`
  language: "en"           # en, zh-TW, ja, etc.
  system_prompt: |
    You are orch, an AI task orchestration CLI running on macOS (Apple Silicon).
    You coordinate AI agents to complete tasks efficiently.

    Response rules:
    - Be concise and direct
    - Keep technical terms in English
    - If the user's language is detected, reply in the same language

# === AI Backend Configuration ===
# Which AI CLI to use for cloud planning and execution.
# Supports: "kiro", "claude", "gemini"
# Leave empty for auto-detection (uses first available in order: kiro > claude > gemini)
# Override at runtime: --backend flag or ORCH_BACKEND env var
#
# Session mode (interactive PTY):
#   /session claude  (or /session c)  — spawns claude --dangerously-skip-permissions
#   /session kiro    (or /session k)  — spawns kiro-cli chat --trust-all-tools
#   /session gemini  (or /session g)  — spawns gemini --skip-trust --yolo
ai_backend:
  primary: ""    # auto-detect

# === Model Configuration ===
# Supports MLX, Ollama, or any OpenAI-compatible endpoint.
# The model with `default: true` is used for local inference (Layer 2).
# MLX is optional — orch works fine without it (skips to Layer 3).
models:
  - name: "qwen-7b"
    backend: "mlx"
    endpoint: "http://localhost:8080"
    model: "mlx-community/Qwen2.5-7B-Instruct-4bit"
    python_path: "~/mlx-env/bin/python3"
    auto_start: true
    port: "8080"
    default: true
  # --- Other available models (uncomment to switch) ---
  # - name: "qwen-3b"
  #   backend: "mlx"
  #   endpoint: "http://localhost:8080"
  #   model: "mlx-community/Qwen2.5-3B-Instruct-4bit"
  #   python_path: "~/mlx-env/bin/python3"
  #   auto_start: true
  #   port: "8080"
  #   default: false
  # - name: "llama-8b"
  #   backend: "ollama"
  #   endpoint: "http://localhost:11434"
  #   model: "llama3.1:8b"
  #   auto_start: true
  #   port: "11434"
  #   default: false

# === Memory Layer ===
memory:
  db_path: "~/.config/orch/orch.db"
  briefing_on_boot: true    # show briefing summary on startup
  history_limit: 1000     # max history entries before auto-pruning (0=unlimited)
  # briefing_source_file: optional path to a status/handoff doc you maintain by
  # hand (e.g. a project dashboard). When set, briefing_on_boot re-reads and
  # re-summarizes it fresh on every startup via the local model, instead of
  # showing whatever was last cached by `orch briefing gen` — which only
  # reflects orch's own task history and goes stale the moment you stop
  # manually re-running it.
  # briefing_source_file: "~/path/to/your/status-or-handoff.md"

# === Workflow Templates ===
# YAML workflows in this directory are loaded and matched by trigger keyword.
workflows:
  dir: "~/.config/orch/workflows"

# === Workspace (optional) ===
# If set, orch will route tasks to subdirectories based on keyword matching.
# workspace:
#   root: "~/projects"
#   subdirs:
#     - name: backend
#       keywords: [api, server, database, python]
#     - name: frontend
#       keywords: [react, css, ui, typescript]
#     - name: infra
#       keywords: [terraform, kubernetes, aws, gcp]

# === Agent Routing ===
# [Removed in v0.11.1] The routing: map has been replaced by route_rules below.
# Routing decisions are now driven entirely by route_rules with keyword/phrase matching.
# routing:
#   kiro: [code, infra, aws, gcp, terraform, deploy, build, test, file-ops, shell]
#   claude: [notion, gcal, gmail, google-workspace, writing, analysis, meeting-notes]
#   gemini: [long-context, video, image, summarization, google-drive, research]

# === Route Rules (v0.14+) ===
# The default config ships with ~120 rules covering claude/kiro/gemini/shell/local.
# Add custom rules here — they MERGE with defaults (do not override them).
# route_rules:
#   cooldown: 3
#   auto_route: false
#   history_size: 5
#   rules:
#     # Gemini examples (v0.14 built-in):
#     - pattern: "用 gemini"
#       target: gemini
#       strength: 3
#       type: phrase
#     - pattern: "google drive"
#       target: gemini
#       strength: 3
#       type: phrase
#     - pattern: summarize
#       target: gemini
#       strength: 2
#       type: keyword

# === Keyword Shortcuts ===
# Commands matching these prefixes bypass AI planning entirely (Layer 1).
keyword_shortcuts:
  - prefix: "kubectl"
    category: infra
  - prefix: "terraform plan"
    category: infra
  - prefix: "terraform apply"
    category: infra
  - prefix: "tf plan"
    category: infra
  - prefix: "tf apply"
    category: infra
  - prefix: "helm upgrade"
    category: deploy
  - prefix: "helm install"
    category: deploy
  - prefix: "helm list"
    category: deploy
  - prefix: "aws s3"
    category: query
  - prefix: "aws ec2"
    category: query
  - prefix: "gcloud compute"
    category: query
  - prefix: "gcloud container"
    category: query

# === Stateless API Backends (v0.16+) ===
# Direct HTTP API calls to cloud model providers.
# Unlike the PTY-based backends above (kiro/claude/gemini), these are one-shot:
# send prompt → get response → done. No interactive session.
#
# Enable by setting `enabled: true` and ensuring credentials are available:
#   Bedrock: AWS credentials (env vars / ~/.aws/credentials / SSO)
#   Vertex AI: GCP ADC (gcloud auth application-default login)
#
# Usage tracking is automatic — see `orch cost` to view statistics.
api_backends:
  bedrock:
    enabled: false
    region: "us-east-1"
    model_id: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
    # Other models: us.amazon.nova-pro-v1:0, us.amazon.nova-lite-v1:0,
    #   us.anthropic.claude-3-haiku-20240307-v1:0
  vertexai:
    enabled: false
    project_id: ""        # your GCP project ID
    region: "us-central1"
    model_id: "gemini-2.5-flash"
    # Other models: gemini-1.5-pro, gemini-1.5-flash

