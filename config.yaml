# orch config template
# Default path: ~/.config/orch/config.yaml
# Override with ORCH_CONFIG environment variable
# Run `orch init` to generate a personalized config interactively.

persona:
  name: "orch"
  # owner: "Your Name"    # set via `orch init`
  language: "en"           # en, zh-TW, ja, etc.
  system_prompt: |
    You are orch, an AI task orchestration CLI running on macOS (Apple Silicon).
    You coordinate AI agents to complete tasks efficiently.

    Response rules:
    - Be concise and direct
    - Keep technical terms in English
    - If the user's language is detected, reply in the same language

# === AI Backend Configuration ===
# Which AI CLI to use for cloud planning and execution.
# Supports: "kiro", "claude", "gemini"
# Leave empty for auto-detection (uses first available in order: kiro > claude > gemini)
# Override at runtime: --backend flag or ORCH_BACKEND env var
ai_backend:
  primary: ""    # auto-detect

# === Model Configuration ===
# Supports MLX, Ollama, or any OpenAI-compatible endpoint.
# The model with `default: true` is used for local inference (Layer 2).
# MLX is optional — orch works fine without it (skips to Layer 3).
models:
  - name: "qwen-3b"
    backend: "mlx"
    endpoint: "http://localhost:8080"
    model: "mlx-community/Qwen2.5-3B-Instruct-4bit"
    python_path: "~/mlx-env/bin/python3"
    auto_start: true
    port: "8080"
    default: true
  # --- Other available models (uncomment to switch) ---
  # - name: "qwen-1.5b"
  #   backend: "mlx"
  #   endpoint: "http://localhost:8080"
  #   model: "mlx-community/Qwen2.5-1.5B-Instruct-4bit"
  #   python_path: "~/mlx-env/bin/python3"
  #   auto_start: true
  #   port: "8080"
  #   default: false
  # - name: "llama-8b"
  #   backend: "ollama"
  #   endpoint: "http://localhost:11434"
  #   model: "llama3.1:8b"
  #   auto_start: true
  #   port: "11434"
  #   default: false

# === Memory Layer ===
memory:
  db_path: "~/.config/orch/orch.db"
  briefing_on_boot: true    # show last briefing summary on startup
  auto_summarize: true      # auto-compress task summary into briefing after completion
  history_limit: 1000     # max history entries before auto-pruning (0=unlimited)

# === Workflow Templates ===
# YAML workflows in this directory are loaded and matched by trigger keyword.
workflows:
  dir: "~/.config/orch/workflows"

# === Workspace (optional) ===
# If set, orch will route tasks to subdirectories based on keyword matching.
# workspace:
#   root: "~/projects"
#   subdirs:
#     - name: backend
#       keywords: [api, server, database, python]
#     - name: frontend
#       keywords: [react, css, ui, typescript]
#     - name: infra
#       keywords: [terraform, kubernetes, aws, gcp]

# === Agent Routing ===
# Maps categories to preferred AI backend.
# Used by the planner to suggest which agent handles which task type.
routing:
  kiro: [code, infra, aws, gcp, terraform, deploy, build, test, file-ops, shell]
  claude: [notion, gcal, gmail, google-workspace, writing, analysis, meeting-notes]
  gemini: [long-context, video, image, summarization, google-drive]

# === Keyword Shortcuts ===
# Commands matching these prefixes bypass AI planning entirely (Layer 1).
keyword_shortcuts:
  - prefix: "kubectl"
    category: infra
  - prefix: "terraform plan"
    category: infra
  - prefix: "terraform apply"
    category: infra
  - prefix: "tf plan"
    category: infra
  - prefix: "tf apply"
    category: infra
  - prefix: "helm upgrade"
    category: deploy
  - prefix: "helm install"
    category: deploy
  - prefix: "helm list"
    category: deploy
  - prefix: "aws s3"
    category: query
  - prefix: "aws ec2"
    category: query
  - prefix: "gcloud compute"
    category: query
  - prefix: "gcloud container"
    category: query
